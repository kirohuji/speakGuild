<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>ManYu 架构图导出工具</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background:#f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding:20px; }
.container { max-width:1100px; margin:0 auto; }
.toolbar { display:flex; align-items:center; justify-content:space-between; background:#fff; border-radius:12px; padding:16px 24px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.toolbar h1 { font-size:18px; color:#1a1a2e; }
.toolbar h1 span { font-size:13px; color:#888; font-weight:normal; margin-left:8px; }
.controls { display:flex; gap:10px; align-items:center; }
.controls select { padding:8px 14px; border:1.5px solid #e0e0e0; border-radius:8px; font-size:14px; background:#fff; cursor:pointer; }
.controls select:focus { outline:none; border-color:#4285f4; }
.btn { display:inline-flex; align-items:center; gap:8px; padding:10px 22px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-primary { background:#4285f4; color:#fff; }
.btn-primary:hover { background:#3367d6; transform:translateY(-1px); box-shadow:0 4px 12px rgba(66,133,244,0.35); }
.btn-success { background:#34a853; color:#fff; }
.btn-success:hover { background:#2d9249; transform:translateY(-1px); box-shadow:0 4px 12px rgba(52,168,83,0.35); }
.btn svg { width:18px; height:18px; fill:currentColor; }
.diagram-wrapper { background:#fff; border-radius:12px; padding:32px; box-shadow:0 2px 12px rgba(0,0,0,0.08); min-height:400px; }
.diagram-title { font-size:16px; font-weight:bold; color:#333; margin-bottom:16px; padding-bottom:10px; border-bottom:2.5px solid #4285f4; }
#diagram-container { display:flex; justify-content:center; align-items:center; min-height:300px; }
#diagram-container svg { max-width:100%; height:auto; }
.tab-bar { display:flex; gap:4px; margin-bottom:20px; background:#fff; border-radius:10px; padding:4px; box-shadow:0 1px 4px rgba(0,0,0,0.06); overflow-x:auto; }
.tab-btn { padding:8px 16px; border:none; border-radius:8px; font-size:13px; cursor:pointer; white-space:nowrap; background:transparent; color:#666; transition:all 0.15s; }
.tab-btn:hover { background:#f5f5f5; color:#333; }
.tab-btn.active { background:#4285f4; color:#fff; font-weight:600; }
.status-bar { margin-top:12px; text-align:center; font-size:13px; color:#888; }
.status-bar.success { color:#34a853; }
@media (max-width:768px) { .toolbar { flex-direction:column; gap:12px; } }
</style>
</head>
<body>
<div class="container">
<div class="toolbar">
    <h1>ManYu 设计图导出工具 <span>高清 PNG / Mermaid</span></h1>
    <div class="controls">
        <select id="scaleSelect">
            <option value="2">2× 高清</option>
            <option value="3">3× 超清</option>
            <option value="1">1× 标准</option>
        </select>
        <button class="btn btn-primary" onclick="downloadCurrentPNG()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            导出当前 PNG
        </button>
        <button class="btn btn-success" onclick="downloadAllPNG()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            导出全部 10 张
        </button>
        <button class="btn" style="background:#f5f5f5;color:#555;" onclick="downloadSVG()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            SVG
        </button>
        <button class="btn" onclick="downloadAllPNG()" style="background:#1a1a2e;color:#fff;">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            一键导出全部 3×
        </button>
    </div>
</div>

<div class="tab-bar" id="tabBar"></div>

<div class="diagram-wrapper">
    <div class="diagram-title" id="diagramTitle">图1：系统架构图</div>
    <div id="diagram-container"><div class="mermaid"></div></div>
</div>
<div class="status-bar" id="statusBar">💡 点击 "下载 PNG" 保存高清图片 • 切换 Tab 查看其他图表</div>
</div>

<script>
// ─── 所有图表定义 ───────────────────────────────────────────
const DIAGRAMS = [
    {
        name: '01-architecture',
        title: '图1：系统架构图',
        mermaid: `graph TB
    subgraph 客户端层
        Web[Web浏览器 React SPA]
        iOS[iOS App Capacitor]
    end
    subgraph 接入层
        Nginx[Nginx反向代理 CDN]
    end
    subgraph 服务层
        NestJS[NestJS API服务]
        Whisper[Whisper语音转文字]
    end
    subgraph 数据层
        PG[(PostgreSQL 16)]
        COS[腾讯云COS对象存储]
    end
    subgraph 外部服务
        DS[DeepSeek AI]
        TTS1[MiniMax TTS]
        TTS2[Cartesia TTS]
    end
    Web --> Nginx; iOS --> Nginx;
    Nginx --> NestJS; NestJS --> PG;
    NestJS --> DS; NestJS --> TTS1; NestJS --> TTS2;
    NestJS --> COS; Whisper -.-> NestJS`
    },
    {
        name: '02-business-flow',
        title: '图2：核心业务流程图',
        mermaid: `graph TD
    Start[用户注册登录] --> Bind[题库绑定 省份x语种x考试类型]
    Bind --> Browse[浏览题库 搜索题目]
    Browse --> Practice[进入练习]; Browse --> Mock[进入模考]
    Practice --> Play[播放TTS语音]; Practice --> Answer[查看参考答案]
    Practice --> Translate[显示中文翻译]
    Practice --> Favorite[收藏题目 加入生词]
    Practice --> AI[AI口语评分反馈]
    Mock --> StartExam[开始模考]; StartExam --> Q1[题目1]
    Q1 --> Q2[题目2]; Q2 --> Q3[题目...]
    Q3 --> Score[自动评分 薄弱点分析]; Score --> History[保存历史成绩]`
    },
    {
        name: '03-module-structure',
        title: '图3：后端模块结构图',
        mermaid: `graph LR
    subgraph 核心业务
        Auth[Auth认证]; Prac[Practice练习]
        Mock2[MockExam模考]; AI2[PracticeAI AI反馈]
        TTS[TTS语音合成]
    end
    subgraph 运营
        Mem[Membership会员]; Pay[Pay支付]
        Cp[Coupon优惠券]; Ref[Referral邀请]
    end
    subgraph 内容
        QB[QuestionBank题库]; RS[ResourceLibrary资料库]
        FA[FileAssets文件管理]
    end
    subgraph 用户
        Notif[Notification通知]; Ach[Achievement成就]
        LB[Leaderboard排行榜]; FB[Feedback反馈]
    end
    subgraph 管理
        Admin[Admin管理后台]; SC[SystemConfig系统配置]
    end
    Auth --> Prac; Prac --> AI2; Prac --> TTS; Prac --> Mock2
    Mem --> Pay; Pay --> Cp`
    },
    {
        name: '04-database-er',
        title: '图4：数据库 ER 关系图',
        mermaid: `erDiagram
    User ||--o{ PracticeRecord : 拥有
    User ||--o{ MockExamRecord : 拥有
    User ||--o{ FavoriteQuestion : 收藏
    User ||--o{ VocabularyWord : 生词
    User ||--o{ Order : 下单
    User ||--o{ DailyActivity : 活跃
    User ||--|| UserMembership : 会员
    UserMembership ||--|| MembershipPlan : 套餐
    Order ||--|| MembershipPlan : 包含
    QuestionBank ||--o{ QuestionTopic : 包含
    QuestionTopic ||--o{ QuestionItem : 包含
    QuestionItem ||--|| QuestionContent : 内容
    PracticeRecord ||--|| QuestionItem : 练习
    MockExamRecord ||--|| MockPaper : 试卷
    MockPaper ||--o{ MockPaperQuestion : 包含
    FileAsset ||--o{ FileReference : 引用
    Achievement ||--o{ UserAchievement : 解锁
    Notification ||--o{ NotificationTarget : 发送`
    },
    {
        name: '05-api-flow',
        title: '图5：API 请求处理时序图',
        mermaid: `sequenceDiagram
    participant C as 客户端 Axios
    participant N as Nginx
    participant G as AuthGuard
    participant V as ValidationPipe
    participant S as Service
    participant DB as Database
    C->>N: HTTP Request + Bearer Token
    N->>G: 路由分发 /api/v1/*
    G->>G: 校验Token 解析Session
    alt Token无效
        G-->>C: 401 Unauthorized
    else Token有效
        G->>V: 注入用户信息
        V->>V: class-validator校验参数
        alt 参数无效
            V-->>C: 400 Bad Request
        else 参数有效
            V->>S: 调用业务逻辑
            S->>DB: Prisma数据操作
            DB-->>S: 返回结果
            S-->>C: TransformInterceptor统一封装 200 OK
        end
    end`
    },
    {
        name: '06-deployment',
        title: '图6：部署架构图',
        mermaid: `graph TB
    User[用户 Web/iOS]
    subgraph CI_CD[GitHub Actions]
        Build[代码检出 构建 测试]
        Docker[Docker多阶段构建]
        Push[推送镜像至Registry]
    end
    subgraph Prod[生产服务器 Docker Compose]
        NX[Nginx容器 反向代理+静态资源]
        BE[NestJS容器 API服务]
        PGP[(PostgreSQL容器 数据库)]
    end
    subgraph CDN[腾讯云CDN]
        COSS[COS对象存储]
    end
    subgraph Ext[外部API]
        DS2[DeepSeek]
        MX[MiniMax]
        CT[Cartesia]
    end
    User --> NX; NX --> BE; BE --> PGP
    BE --> DS2; BE --> MX; BE --> CT; BE --> COSS
    Build --> Docker --> Push; Push -.->|SSH部署| BE`
    },
    {
        name: '07-auth-flow',
        title: '图7：用户权限控制图',
        mermaid: `graph TD
    Login[用户登录] --> Session[创建Session]
    Session --> RC{角色判断}
    RC -->|admin| AP[管理后台]
    RC -->|user| UP[用户前端]
    UP --> PR[练习 模考 收藏]
    UP --> ME[会员中心]; UP --> PP[个人中心]
    AP --> UM[用户管理]; AP --> CM[内容管理]
    AP --> ST[数据统计]; AP --> SE[系统设置]
    AP --> BI[账单管理]
    subgraph 权限层
        A1[requireAuthSession 会话校验]
        A2[requireAdmin admin角色校验]
    end
    A1 --> RC; A2 --> AP`
    },
    {
        name: '08-tts-flow',
        title: '图8：TTS 语音合成流程图',
        mermaid: `flowchart TD
    A[用户点击播放] --> B[查询音频缓存 QuestionAudio]
    B -->|有缓存| C[直接返回COS 音频URL]
    B -->|无缓存| D[计算配置哈希SHA1]
    D --> E{选择TTS提供商}
    E -->|MiniMax| F[调用MiniMax API]
    E -->|Cartesia| G[调用Cartesia API]
    F --> H[生成音频]; G --> H
    H --> I[上传至腾讯云COS]
    I --> J[存入缓存表]; J --> C; C --> K[前端播放]`
    },
    {
        name: '09-ai-feedback',
        title: '图9：AI 口语反馈时序图',
        mermaid: `sequenceDiagram
    participant U as 用户
    participant F as 前端
    participant B as 后端API
    participant AI as DeepSeek LLM
    U->>F: 点击AI反馈
    F->>B: POST /practice-ai/feedback
    B->>B: 拼接Prompt+题目+答案
    B->>AI: streamText流式请求
    AI-->>B: 逐token返回
    B-->>F: SSE data:逐字推送
    F-->>U: 实时渲染评分
    Note over F,U: 发音准确性 语法正确性\\n内容完整性 表达流畅度
    AI-->>B: 完整分析结束
    B-->>F: stream结束标记
    F-->>U: 显示完整评分报告`
    },
    {
        name: '10-payment-flow',
        title: '图10：支付与会员开通时序图',
        mermaid: `sequenceDiagram
    participant U as 用户
    participant F as 前端
    participant B as 后端
    participant P as 支付网关
    U->>F: 选择套餐 点击开通
    F->>B: POST /pay/create-order
    B->>B: 创建Order status=pending
    B-->>F: 返回支付二维码
    F->>U: 展示二维码
    U->>P: 扫码支付
    P-->>B: 回调通知支付结果
    alt 支付成功
        B->>B: Order status=paid
        B->>B: 创建/延长UserMembership
        B-->>F: 支付成功
        F-->>U: 会员权益生效
    else 支付失败
        B-->>F: 支付失败
        F-->>U: 展示失败原因
    end`
    },
];

let currentIndex = 0;
mermaid.initialize({ 
    theme: 'default',
    themeVariables: { 
        primaryColor: '#e8f0fe', primaryBorderColor: '#4285f4',
        secondaryColor: '#fff3e0', tertiaryColor: '#e8f5e9',
        lineColor: '#666', textColor: '#333',
        fontSize: '14px',
    },
    flowchart: { htmlLabels: true, curve: 'basis', padding: 16 },
    sequence: { showSequenceNumbers: false, actorFontSize: 13, noteFontSize: 12 },
    er: { useMaxWidth: true },
});

function renderDiagram(index) {
    currentIndex = index;
    const d = DIAGRAMS[index];
    document.getElementById('diagramTitle').textContent = d.title;
    const container = document.getElementById('diagram-container');
    container.innerHTML = '<div class="mermaid">' + d.mermaid + '</div>';
    
    // Update active tab
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
    });

    // Re-render mermaid
    try { mermaid.run(); } catch(e) {
        // Retry after a short delay
        setTimeout(() => { try { mermaid.run(); } catch(e2) {} }, 100);
    }
    document.getElementById('statusBar').textContent = `当前：${d.title}`;
    document.getElementById('statusBar').className = 'status-bar';
}

async function downloadCurrentPNG() {
    const scale = parseInt(document.getElementById('scaleSelect').value);
    const svg = document.getElementById('diagram-container').querySelector('svg');
    if (!svg) { alert('请等待图表渲染完成'); return; }

    const d = DIAGRAMS[currentIndex];
    setStatus('⏳ 正在渲染高清 PNG...', '');

    try {
        const pngDataUrl = await svgToPng(svg, scale);
        const link = document.createElement('a');
        link.download = `guideReady-${d.name}.png`;
        link.href = pngDataUrl;
        link.click();
        setStatus(`✅ 已保存：${link.download}`, 'success');
    } catch(err) {
        setStatus('❌ 失败：' + err.message, '');
    }
}

async function downloadAllPNG() {
    const scale = parseInt(document.getElementById('scaleSelect').value);
    setStatus('⏳ 正在批量导出 10 张高清图...', '');

    for (let i = 0; i < DIAGRAMS.length; i++) {
        // Switch tab
        const tabs = document.querySelectorAll('.tab-btn');
        tabs[i].click();
        await new Promise(r => setTimeout(r, 1500));

        // Wait for mermaid to finish
        const svg = document.getElementById('diagram-container').querySelector('svg');
        if (!svg) continue;

        const d = DIAGRAMS[i];
        try {
            const pngDataUrl = await svgToPng(svg, scale);
            const link = document.createElement('a');
            link.download = `guideReady-${d.name}.png`;
            link.href = pngDataUrl;
            link.click();
            setStatus(`⏳ (${i+1}/10) 已保存：${link.download}`, '');
            await new Promise(r => setTimeout(r, 100));
        } catch(err) {
            setStatus(`⚠️ (${i+1}/10) ${d.name} 失败：${err.message}`, '');
        }
    }
    setStatus('✅ 全部 10 张图导出完成！', 'success');
}

function svgToPng(svgElement, scale) {
    return new Promise((resolve, reject) => {
        // Clone the SVG to avoid mutating the original
        const clone = svgElement.cloneNode(true);

        // Ensure all foreignObjects have proper styling (for Mermaid labels)
        const fos = clone.querySelectorAll('foreignObject');
        fos.forEach(fo => {
            const div = fo.querySelector('div');
            if (div) {
                div.style.fontFamily = '-apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif';
                div.style.fontSize = '14px';
                div.style.color = '#333';
                div.style.lineHeight = '1.4';
            }
        });

        // Get the actual bounding box of the SVG content
        const bbox = svgElement.getBoundingClientRect();
        const vb = svgElement.getAttribute('viewBox');
        let width, height;
        if (vb) {
            const parts = vb.split(/\s+/).map(Number);
            width = parts[2];
            height = parts[3];
        } else {
            width = bbox.width || 800;
            height = bbox.height || 600;
        }

        clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        clone.setAttribute('width', width);
        clone.setAttribute('height', height);
        clone.setAttribute('viewBox', `0 0 ${width} ${height}`);

        const serializer = new XMLSerializer();
        let source = serializer.serializeToString(clone);

        // Fix potential namespace issues
        source = source.replace(/<br>/g, '<br/>');
        source = source.replace(/<br\s*\/?>/g, '<br/>');

        const encoded = encodeURIComponent(source);
        const url = 'data:image/svg+xml;charset=utf-8,' + encoded;

        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = width * scale;
            canvas.height = height * scale;
            const ctx = canvas.getContext('2d');
            ctx.scale(scale, scale);
            ctx.drawImage(img, 0, 0);
            resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = () => {
            reject(new Error('SVG 渲染失败'));
        };
        img.src = url;
    });
}

function setStatus(msg, cls) {
    const el = document.getElementById('statusBar');
    el.textContent = msg;
    el.className = 'status-bar' + (cls ? ' ' + cls : '');
}

function downloadSVG() {
    const svg = document.getElementById('diagram-container').querySelector('svg');
    if (!svg) { alert('请等待图表渲染完成'); return; }

    const clone = svg.cloneNode(true);
    clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    const serializer = new XMLSerializer();
    const source = serializer.serializeToString(clone);
    const blob = new Blob([source], { type: 'image/svg+xml;charset=utf-8' });

    const d = DIAGRAMS[currentIndex];
    const link = document.createElement('a');
    link.download = `manyu-${d.name}.svg`;
    link.href = URL.createObjectURL(blob);
    link.click();
    URL.revokeObjectURL(link.href);

    setStatus(`✅ 已保存：${link.download}`, 'success');
}

// ─── Build tab bar ──────────────────────────────────────────
const tabBar = document.getElementById('tabBar');
DIAGRAMS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    // Extract short name from title
    const shortName = d.title.replace(/图\d+：/, '').substring(0, 8) + (d.title.replace(/图\d+：/, '').length > 8 ? '…' : '');
    btn.textContent = shortName;
    btn.title = d.title;
    btn.onclick = () => renderDiagram(i);
    tabBar.appendChild(btn);
});

// ─── Batch download all diagrams as high-res PNG ──────────
async function downloadAllPNG() {
    const status = document.getElementById('statusBar');
    status.textContent = '⏳ 正在导出全部图表（共 ' + DIAGRAMS.length + ' 张）...';
    status.className = 'status-bar';
    
    for (let i = 0; i < DIAGRAMS.length; i++) {
        renderDiagram(i);
        await new Promise(r => setTimeout(r, 1200)); // wait for mermaid render
        
        status.textContent = `⏳ 正在导出 ${i+1}/${DIAGRAMS.length}：${DIAGRAMS[i].title}`;
        
        const svg = document.querySelector('svg');
        if (!svg) continue;
        
        const dpr = parseInt(document.getElementById('scaleSelect').value) || 3;
        const w = parseInt(svg.getAttribute('width')) || parseInt(svg.getAttribute('viewBox')?.split(' ')[2]) || 800;
        const h = parseInt(svg.getAttribute('height')) || parseInt(svg.getAttribute('viewBox')?.split(' ')[3]) || 600;
        
        const canvas = document.createElement('canvas');
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr);
        
        const xml = new XMLSerializer().serializeToString(svg);
        const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        await new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
                URL.revokeObjectURL(url);
                const link = document.createElement('a');
                link.download = `guideReady-${DIAGRAMS[i].name}-${w*dpr}x${h*dpr}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                resolve();
            };
            img.src = url;
        });
    }
    
    status.textContent = `✅ 已全部导出 ${DIAGRAMS.length} 张高清 PNG！`;
    status.className = 'status-bar success';
}

// ─── Initial render ─────────────────────────────────────────
renderDiagram(0);
</script>
</body>
</html>
