server {
  listen 80;
  server_name hope.lourd.top;

  return 301 https://$host:2605$request_uri;
}

server {
  listen 443 ssl;
  server_name hope.lourd.top;

  ssl_certificate /etc/nginx/ssl/hope.lourd.top_bundle.crt;
  ssl_certificate_key /etc/nginx/ssl/hope.lourd.top.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  root /usr/share/nginx/html;
  index index.html;

  # ---------- WebSocket (Socket.IO) ----------
  location /socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://backend:3001/socket.io/;
  }

  # ---------- 业务 API ----------
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://backend:3001;
  }

  # ---------- Apple Universal Links (AASA) ----------
  # 同时响应 /.well-known/apple-app-site-association 和 /apple-app-site-association
  location = /.well-known/apple-app-site-association {
    root /usr/share/nginx/html;
    default_type application/json;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /apple-app-site-association {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600";
    try_files /apple-app-site-association /.well-known/apple-app-site-association;
  }

  # ---------- 静态资源 ----------
  location / {
    try_files $uri $uri/ /index.html;
  }
}
