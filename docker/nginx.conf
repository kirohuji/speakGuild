# ────────── 速率限制（防止 API 滥用 / 暴力破解）──────────
# 对 /api/auth 路径限制更严格（登录/注册/密码重置）
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
# 通用 API 限制
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

server {
  listen 80;
  server_name yingyudatech.com www.yingyudatech.com;

  return 301 https://yingyudatech.com$request_uri;
}

server {
  listen 3605 ssl;
  server_name hope.lourd.top;

  ssl_certificate /etc/nginx/ssl/hope.lourd.top_bundle.crt;
  ssl_certificate_key /etc/nginx/ssl/hope.lourd.top.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # ────────── 安全响应头 ──────────
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

  root /usr/share/nginx/html/hope;
  index index.html;

  # ---------- WebSocket (Socket.IO) ----------
  location /socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://backend:3001/socket.io/;
  }

  # ---------- 认证路由（严格速率限制，防暴力破解）----------
  location /api/auth/ {
    limit_req zone=auth_limit burst=5 nodelay;
    limit_req_status 429;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend:3001;
  }

  # ---------- 业务 API ----------
  location /api/ {
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://backend:3001;
  }

  # ---------- Apple Universal Links (AASA) ----------
  # 同时响应 /.well-known/apple-app-site-association 和 /apple-app-site-association
  location = /.well-known/apple-app-site-association {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /apple-app-site-association {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600";
    try_files /apple-app-site-association /.well-known/apple-app-site-association;
  }

  # ---------- 静态资源 ----------
  location / {
    try_files $uri $uri/ /index.html;
  }
}

# Apple 只通过标准 HTTPS 443 校验 Universal Links。
# 该虚拟主机只提供 AASA 文件，不在 443 暴露 Hope 前端或后端。
server {
  listen 443 ssl;
  server_name hope.lourd.top;

  ssl_certificate /etc/nginx/ssl/hope.lourd.top_bundle.crt;
  ssl_certificate_key /etc/nginx/ssl/hope.lourd.top.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  root /usr/share/nginx/html/hope;

  location = /.well-known/apple-app-site-association {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600";
  }

  location = /apple-app-site-association {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600";
    try_files /apple-app-site-association /.well-known/apple-app-site-association;
  }

  location / {
    return 404;
  }
}

server {
  listen 443 ssl;
  server_name yingyudatech.com;

  ssl_certificate /etc/nginx/ssl/yingyudatech.com_bundle.crt;
  ssl_certificate_key /etc/nginx/ssl/yingyudatech.com.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  root /usr/share/nginx/html/company;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }
}

# www 统一跳转到裸域，避免产生两套站点 URL。
# yingyudatech.com 的证书必须同时包含 www.yingyudatech.com。
server {
  listen 443 ssl;
  server_name www.yingyudatech.com;

  ssl_certificate /etc/nginx/ssl/yingyudatech.com_bundle.crt;
  ssl_certificate_key /etc/nginx/ssl/yingyudatech.com.key;
  ssl_protocols TLSv1.2 TLSv1.3;

  return 301 https://yingyudatech.com$request_uri;
}
