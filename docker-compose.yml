services:
  db:
    image: postgres:16-alpine
    container_name: guideready-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guideready}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guideready}
      POSTGRES_DB: ${POSTGRES_DB:-guideready}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-guideready} -d ${POSTGRES_DB:-guideready}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: guideready-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-guideready}:${POSTGRES_PASSWORD:-guideready}@db:5432/${POSTGRES_DB:-guideready}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      WECHAT_CLIENT_ID: ${WECHAT_CLIENT_ID:-}
      WECHAT_CLIENT_SECRET: ${WECHAT_CLIENT_SECRET:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      WHISPER_INFERENCE_URL: ${WHISPER_INFERENCE_URL:-}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-en}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      FILE_CLEANUP_CRON: ${FILE_CLEANUP_CRON:-0 30 3 * * *}
      FILE_CLEANUP_DAYS: ${FILE_CLEANUP_DAYS:-7}
      FILE_CLEANUP_DRY_RUN: ${FILE_CLEANUP_DRY_RUN:-false}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_PRIVATE_URL_EXPIRES_SECONDS: ${COS_PRIVATE_URL_EXPIRES_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: /api/v1/guide-exam
    container_name: guideready-nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ${SSL_DEPLOY:-./ssl}:/etc/nginx/ssl:ro
    ports:
      - "2605:443"

volumes:
  postgres_data:
