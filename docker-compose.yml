services:
  db:
    image: postgres:16-alpine
    container_name: manyu-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-manyu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manyu}
      POSTGRES_DB: ${POSTGRES_DB:-manyu}
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-manyu} -d ${POSTGRES_DB:-manyu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: manyu-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-manyu}:${POSTGRES_PASSWORD:-manyu}@db:5432/${POSTGRES_DB:-manyu}
      REDIS_URL: ${REDIS_URL:-redis://127.0.0.1:6379}
      FRONTEND_URL: ${FRONTEND_URL:-https://hope.lourd.top:3605,capacitor://localhost,ionic://localhost}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://hope.lourd.top:3605}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      WECHAT_CLIENT_ID: ${WECHAT_CLIENT_ID:-}
      WECHAT_CLIENT_SECRET: ${WECHAT_CLIENT_SECRET:-}
      WECHAT_NATIVE_APP_ID: ${WECHAT_NATIVE_APP_ID:-}
      WECHAT_NATIVE_APP_SECRET: ${WECHAT_NATIVE_APP_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
      APPLE_TEAM_ID: ${APPLE_TEAM_ID:-}
      APPLE_KEY_ID: ${APPLE_KEY_ID:-}
      APPLE_PRIVATE_KEY: ${APPLE_PRIVATE_KEY:-}
      APPLE_APP_BUNDLE_IDENTIFIER: ${APPLE_APP_BUNDLE_IDENTIFIER:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_GROUP_ID: ${MINIMAX_GROUP_ID:-}
      CARTESIA_API_KEY: ${CARTESIA_API_KEY:-}
      WHISPER_INFERENCE_URL: ${WHISPER_INFERENCE_URL:-}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-en}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      FILE_CLEANUP_CRON: ${FILE_CLEANUP_CRON:-0 30 3 * * *}
      FILE_CLEANUP_DAYS: ${FILE_CLEANUP_DAYS:-7}
      FILE_CLEANUP_DRY_RUN: ${FILE_CLEANUP_DRY_RUN:-false}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_PRIVATE_URL_EXPIRES_SECONDS: ${COS_PRIVATE_URL_EXPIRES_SECONDS:-3600}
      BACKEND_URL: ${BACKEND_URL:-https://hope.lourd.top:3605}
      WHISPER_TIMEOUT_MS: ${WHISPER_TIMEOUT_MS:-300000}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      ALIPAY_GATEWAY: ${ALIPAY_GATEWAY:-https://openapi.alipay.com/gateway.do}
      ALIPAY_SIGN_TYPE: ${ALIPAY_SIGN_TYPE:-RSA2}
      ALIPAY_KEY_TYPE: ${ALIPAY_KEY_TYPE:-PKCS8}
      WECHAT_PAY_APP_ID: ${WECHAT_PAY_APP_ID:-}
      WECHAT_PAY_MCH_ID: ${WECHAT_PAY_MCH_ID:-}
      WECHAT_PAY_API_V3_KEY: ${WECHAT_PAY_API_V3_KEY:-}
      WECHAT_PAY_PRIVATE_KEY: ${WECHAT_PAY_PRIVATE_KEY:-}
      WECHAT_PAY_SERIAL_NO: ${WECHAT_PAY_SERIAL_NO:-}
      WECHAT_PAY_PUBLIC_KEY: ${WECHAT_PAY_PUBLIC_KEY:-}
      REVENUECAT_API_KEY: ${REVENUECAT_API_KEY:-}
      REVENUECAT_PROJECT_ID: ${REVENUECAT_PROJECT_ID:-}
      REVENUECAT_WEBHOOK_AUTHORIZATION: ${REVENUECAT_WEBHOOK_AUTHORIZATION:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      OPS_SERVICE_NAME: ${OPS_SERVICE_NAME:-manyu-backend}
      OPS_ALERT_WEBHOOK_URL: ${OPS_ALERT_WEBHOOK_URL:-}
      OPS_ALERT_WEBHOOK_AUTHORIZATION: ${OPS_ALERT_WEBHOOK_AUTHORIZATION:-}
      OPS_ALERT_MIN_INTERVAL_SECONDS: ${OPS_ALERT_MIN_INTERVAL_SECONDS:-300}
      OPS_CAPACITY_CHECK_CRON: ${OPS_CAPACITY_CHECK_CRON:-0 15 9 * * *}
      OPS_DB_MAX_BYTES: ${OPS_DB_MAX_BYTES:-0}
      OPS_FILE_ASSET_MAX_BYTES: ${OPS_FILE_ASSET_MAX_BYTES:-0}
      TENCENT_SECRET_ID: ${TENCENT_SECRET_ID:-}
      TENCENT_SECRET_KEY: ${TENCENT_SECRET_KEY:-}
      TENCENT_REGION: ${TENCENT_REGION:-ap-guangzhou}
      TENCENT_SMS_APP_ID: ${TENCENT_SMS_APP_ID:-}
      TENCENT_SMS_SIGN_NAME: ${TENCENT_SMS_SIGN_NAME:-}
      TENCENT_SMS_TEMPLATE_ID: ${TENCENT_SMS_TEMPLATE_ID:-}
      STT_PROVIDER: ${STT_PROVIDER:-whisper}
    depends_on:
      db:
        condition: service_healthy
  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_API_BASE_URL: /api/v1/manyu
        VITE_APPLE_CLIENT_ID: ${VITE_APPLE_CLIENT_ID:-}
        VITE_XFD_API_KEY: ${VITE_XFD_API_KEY:-}
        VITE_MW_API_KEY: ${VITE_MW_API_KEY:-}
        VITE_REVENUECAT_API_KEY: ${VITE_REVENUECAT_API_KEY:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    container_name: manyu-nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ${SSL_DEPLOY:-./ssl}:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
      - "3605:3605"

volumes:
  postgres_data:
