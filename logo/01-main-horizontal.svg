<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="brand-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Icon: Speech bubble with guide flag accent -->
  <g transform="translate(10, 10)">
    <!-- Outer rounded square -->
    <rect x="2" y="2" width="96" height="96" rx="24" ry="24" fill="url(#brand)" />
    <!-- Inner speech bubble shape -->
    <path d="M50 28 C38 28 28 36 28 46 C28 56 38 64 50 64 C53 64 56 63.5 59 62.5 L62 68 L59 62.5 C56 63.5 53 64 50 64" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Sound waves -->
    <path d="M68 40 Q74 46 68 52" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M73 36 Q81 46 73 56" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Small guide flag dot -->
    <circle cx="72" cy="34" r="2.5" fill="white" opacity="0.9"/>
  </g>

  <!-- Text: ³8¶ -->
  <text x="130" y="68" font-family="'Plus Jakarta Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="42" font-weight="800" fill="url(#brand)" letter-spacing="4">³8¶</text>

  <!-- Tagline: GuideReady -->
  <text x="132" y="96" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-size="16" font-weight="600" fill="#94A3B8" letter-spacing="2">GuideReady</text>

  <!-- Small divider dot -->
  <circle cx="382" cy="91" r="2" fill="#94A3B8" opacity="0.5"/>
</svg>
