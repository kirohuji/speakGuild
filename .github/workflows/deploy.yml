name: Deploy on Self-Hosted Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      WECHAT_CLIENT_ID: ${{ secrets.WECHAT_CLIENT_ID }}
      WECHAT_CLIENT_SECRET: ${{ secrets.WECHAT_CLIENT_SECRET }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
      CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
      WHISPER_INFERENCE_URL: ${{ secrets.WHISPER_INFERENCE_URL }}
      WHISPER_LANGUAGE: ${{ secrets.WHISPER_LANGUAGE }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      FILE_CLEANUP_CRON: ${{ secrets.FILE_CLEANUP_CRON }}
      FILE_CLEANUP_DAYS: ${{ secrets.FILE_CLEANUP_DAYS }}
      FILE_CLEANUP_DRY_RUN: ${{ secrets.FILE_CLEANUP_DRY_RUN }}
      COS_BUCKET: ${{ secrets.COS_BUCKET }}
      COS_REGION: ${{ secrets.COS_REGION }}
      COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
      COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
      COS_PRIVATE_URL_EXPIRES_SECONDS: ${{ secrets.COS_PRIVATE_URL_EXPIRES_SECONDS }}
      SSL_DEPLOY: ${{ secrets.SSL_DEPLOY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy with local self-hosted runner
        run: |
          set -euo pipefail
          docker compose up -d --build

      - name: Wait for backend container ready
        run: |
          set -euo pipefail
          BACKEND_CONTAINER_ID="$(docker compose ps -q backend)"
          if [ -z "${BACKEND_CONTAINER_ID}" ]; then
            echo "Backend container not found."
            docker compose ps
            exit 1
          fi

          for i in {1..30}; do
            STATE="$(docker inspect -f '{{.State.Status}}' "${BACKEND_CONTAINER_ID}")"
            HEALTH="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${BACKEND_CONTAINER_ID}")"
            echo "Attempt ${i}: backend state=${STATE}, health=${HEALTH}"

            if [ "${STATE}" = "running" ] && { [ "${HEALTH}" = "healthy" ] || [ "${HEALTH}" = "none" ]; }; then
              echo "Backend container is ready."
              break
            fi

            if [ "${i}" -eq 30 ]; then
              echo "Backend container failed to become ready in time."
              docker compose logs --tail=200 backend
              exit 1
            fi

            sleep 5
          done

      - name: Reset database and push Prisma schema (test env)
        run: |
          set -euo pipefail
          trap 'echo "Prisma db push failed, print backend logs:"; docker compose logs --tail=200 backend' ERR
          docker compose exec -T backend pnpm --filter @guideready/backend exec prisma db push --force-reset

      - name: Seed database
        run: |
          set -euo pipefail
          trap 'echo "Seed step failed, print backend logs:"; docker compose logs --tail=200 backend' ERR
          docker compose exec -T backend pnpm --filter @guideready/backend prisma:seed

      - name: Cleanup dangling images
        run: |
          set -euo pipefail
          docker image prune -f
