name: Deploy via SSH

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Generate env file from secrets
        run: |
          # ===== 🔴 Required (must be set in GitHub Secrets) =====
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" > /tmp/deploy.env
          echo "BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}" >> /tmp/deploy.env
          echo "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" >> /tmp/deploy.env
          echo "MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}" >> /tmp/deploy.env
          echo "MINIMAX_GROUP_ID=${{ secrets.MINIMAX_GROUP_ID }}" >> /tmp/deploy.env
          echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> /tmp/deploy.env
          echo "COS_BUCKET=${{ secrets.COS_BUCKET }}" >> /tmp/deploy.env
          echo "COS_SECRET_ID=${{ secrets.COS_SECRET_ID }}" >> /tmp/deploy.env
          echo "COS_SECRET_KEY=${{ secrets.COS_SECRET_KEY }}" >> /tmp/deploy.env
          echo "BACKEND_URL=${{ secrets.BACKEND_URL }}" >> /tmp/deploy.env
          echo "VITE_REVENUECAT_API_KEY=${{ secrets.VITE_REVENUECAT_API_KEY }}" >> /tmp/deploy.env
          echo "REVENUECAT_WEBHOOK_AUTHORIZATION=${{ secrets.REVENUECAT_WEBHOOK_AUTHORIZATION }}" >> /tmp/deploy.env

          # ===== 🟢 With defaults (set GitHub Variable to override, or use default) =====
          echo "WHISPER_LANGUAGE=${{ vars.WHISPER_LANGUAGE || 'en' }}" >> /tmp/deploy.env
          echo "WHISPER_TIMEOUT_MS=${{ vars.WHISPER_TIMEOUT_MS || '300000' }}" >> /tmp/deploy.env
          echo "COS_REGION=${{ vars.COS_REGION || 'ap-shanghai' }}" >> /tmp/deploy.env
          echo "COS_PRIVATE_URL_EXPIRES_SECONDS=${{ vars.COS_PRIVATE_URL_EXPIRES_SECONDS || '3600' }}" >> /tmp/deploy.env
          echo "FILE_CLEANUP_CRON=${{ vars.FILE_CLEANUP_CRON || '0 30 3 * * *' }}" >> /tmp/deploy.env
          echo "FILE_CLEANUP_DAYS=${{ vars.FILE_CLEANUP_DAYS || '7' }}" >> /tmp/deploy.env
          echo "FILE_CLEANUP_DRY_RUN=${{ vars.FILE_CLEANUP_DRY_RUN || 'false' }}" >> /tmp/deploy.env
          echo "ALIPAY_GATEWAY=${{ vars.ALIPAY_GATEWAY || 'https://openapi.alipay.com/gateway.do' }}" >> /tmp/deploy.env
          echo "ALIPAY_SIGN_TYPE=${{ vars.ALIPAY_SIGN_TYPE || 'RSA2' }}" >> /tmp/deploy.env
          echo "ALIPAY_KEY_TYPE=${{ vars.ALIPAY_KEY_TYPE || 'PKCS8' }}" >> /tmp/deploy.env
          echo "SSL_DEPLOY=${{ vars.SSL_DEPLOY || './ssl' }}" >> /tmp/deploy.env

          # ===== 🟡 Optional (empty = feature disabled) =====
          echo "WECHAT_CLIENT_ID=${{ secrets.WECHAT_CLIENT_ID }}" >> /tmp/deploy.env
          echo "WECHAT_CLIENT_SECRET=${{ secrets.WECHAT_CLIENT_SECRET }}" >> /tmp/deploy.env
          echo "WECHAT_NATIVE_APP_ID=${{ secrets.WECHAT_NATIVE_APP_ID }}" >> /tmp/deploy.env
          echo "WECHAT_NATIVE_APP_SECRET=${{ secrets.WECHAT_NATIVE_APP_SECRET }}" >> /tmp/deploy.env
          echo "CARTESIA_API_KEY=${{ secrets.CARTESIA_API_KEY }}" >> /tmp/deploy.env
          echo "WHISPER_INFERENCE_URL=${{ secrets.WHISPER_INFERENCE_URL }}" >> /tmp/deploy.env
          echo "ALIPAY_APP_ID=${{ secrets.ALIPAY_APP_ID }}" >> /tmp/deploy.env
          echo "ALIPAY_PRIVATE_KEY=${{ secrets.ALIPAY_PRIVATE_KEY }}" >> /tmp/deploy.env
          echo "ALIPAY_PUBLIC_KEY=${{ secrets.ALIPAY_PUBLIC_KEY }}" >> /tmp/deploy.env
          echo "WECHAT_PAY_APP_ID=${{ secrets.WECHAT_PAY_APP_ID }}" >> /tmp/deploy.env
          echo "WECHAT_PAY_MCH_ID=${{ secrets.WECHAT_PAY_MCH_ID }}" >> /tmp/deploy.env
          echo "WECHAT_PAY_API_V3_KEY=${{ secrets.WECHAT_PAY_API_V3_KEY }}" >> /tmp/deploy.env
          echo "WECHAT_PAY_PRIVATE_KEY=${{ secrets.WECHAT_PAY_PRIVATE_KEY }}" >> /tmp/deploy.env
          echo "WECHAT_PAY_SERIAL_NO=${{ secrets.WECHAT_PAY_SERIAL_NO }}" >> /tmp/deploy.env
          echo "WECHAT_PAY_PUBLIC_KEY=${{ secrets.WECHAT_PAY_PUBLIC_KEY }}" >> /tmp/deploy.env
          echo "REVENUECAT_API_KEY=${{ secrets.REVENUECAT_API_KEY }}" >> /tmp/deploy.env
          echo "REVENUECAT_PROJECT_ID=${{ secrets.REVENUECAT_PROJECT_ID }}" >> /tmp/deploy.env
          echo "TENCENT_SECRET_ID=${{ secrets.TENCENT_SECRET_ID }}" >> /tmp/deploy.env
          echo "TENCENT_SECRET_KEY=${{ secrets.TENCENT_SECRET_KEY }}" >> /tmp/deploy.env
          echo "TENCENT_REGION=${{ vars.TENCENT_REGION || 'ap-guangzhou' }}" >> /tmp/deploy.env
          echo "TENCENT_SMS_APP_ID=${{ secrets.TENCENT_SMS_APP_ID }}" >> /tmp/deploy.env
          echo "TENCENT_SMS_SIGN_NAME=${{ secrets.TENCENT_SMS_SIGN_NAME }}" >> /tmp/deploy.env
          echo "TENCENT_SMS_TEMPLATE_ID=${{ secrets.TENCENT_SMS_TEMPLATE_ID }}" >> /tmp/deploy.env
          echo "STT_PROVIDER=${{ vars.STT_PROVIDER || 'whisper' }}" >> /tmp/deploy.env

      - name: Sync code and env to server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ vars.SSH_PORT || 22 }}" \
            --exclude 'node_modules' \
            --exclude '.git' \
            --exclude 'dist' \
            --exclude 'pnpm-lock.yaml' \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOY_DIR || '/home/deploy/manyu' }}/
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ vars.SSH_PORT || 22 }}" \
            /tmp/deploy.env \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOY_DIR || '/home/deploy/manyu' }}/.env

      - name: Write deploy script
        run: |
          echo 'set -euo pipefail' > /tmp/deploy.sh
          echo 'cd ${{ vars.DEPLOY_DIR || '/home/deploy/manyu' }}' >> /tmp/deploy.sh
          echo 'docker compose up -d --build' >> /tmp/deploy.sh
          echo 'BACKEND_ID="$(docker compose ps -q backend)"' >> /tmp/deploy.sh
          echo 'if [ -z "$BACKEND_ID" ]; then' >> /tmp/deploy.sh
          echo '  echo "Backend container not found"' >> /tmp/deploy.sh
          echo '  docker compose ps' >> /tmp/deploy.sh
          echo '  exit 1' >> /tmp/deploy.sh
          echo 'fi' >> /tmp/deploy.sh
          echo 'for i in $(seq 1 30); do' >> /tmp/deploy.sh
          echo '  STATE="$(docker inspect -f '"'{{.State.Status}}'"' "$BACKEND_ID")"' >> /tmp/deploy.sh
          echo '  HEALTH="$(docker inspect -f '"'{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}'"' "$BACKEND_ID")"' >> /tmp/deploy.sh
          echo '  echo "Attempt ${i}: state=${STATE} health=${HEALTH}"' >> /tmp/deploy.sh
          echo '  if [ "$STATE" = "running" ] && { [ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "none" ]; }; then' >> /tmp/deploy.sh
          echo '    echo "Backend is ready."' >> /tmp/deploy.sh
          echo '    break' >> /tmp/deploy.sh
          echo '  fi' >> /tmp/deploy.sh
          echo '  if [ "$i" -eq 30 ]; then' >> /tmp/deploy.sh
          echo '    echo "Backend failed to become ready."' >> /tmp/deploy.sh
          echo '    docker compose logs --tail=200 backend' >> /tmp/deploy.sh
          echo '    exit 1' >> /tmp/deploy.sh
          echo '  fi' >> /tmp/deploy.sh
          echo '  sleep 5' >> /tmp/deploy.sh
          echo 'done' >> /tmp/deploy.sh
          echo 'docker image prune -f' >> /tmp/deploy.sh

      - name: Sync and execute on server
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no -p ${{ vars.SSH_PORT || 22 }}" \
            /tmp/deploy.sh \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ vars.DEPLOY_DIR || '/home/deploy/manyu' }}/deploy.sh
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            -p ${{ vars.SSH_PORT || 22 }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "bash ${{ vars.DEPLOY_DIR || '/home/deploy/manyu' }}/deploy.sh"
