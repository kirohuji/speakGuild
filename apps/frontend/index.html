<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#090713" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F4FAF7" media="(prefers-color-scheme: light)" />
    <title>漫语町 — 沉浸式英语输出训练</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var mode = stored === 'dark' || stored === 'light' ? stored : (systemDark ? 'dark' : 'light');
          var root = document.documentElement;
          root.classList.remove(mode === 'dark' ? 'light' : 'dark');
          root.classList.add(mode);
          root.style.colorScheme = mode;
        } catch (_) {}
      })();
    </script>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        background: #f4faf7;
      }

      html.dark,
      html.dark body,
      html.dark #root {
        background: #090713;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
